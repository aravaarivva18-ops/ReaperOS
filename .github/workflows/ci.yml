name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-env: '3.12'
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Create mock paths for tests
      run: |
        mkdir -p ~/Documents/Knowledge-Brain
        # Create an empty db.sqlite file
        touch ~/Documents/Knowledge-Brain/db.sqlite
        # Write .env for CI
        echo "REAPER_PROJECT_ROOT=$(pwd)" > .env
        echo "REAPER_WIKI_PATH=$HOME/Documents/Knowledge-Brain" >> .env

    - name: Run pytest tests
      run: |
        PYTHONPATH=$(pwd):$(pwd)/engine pytest tests/
